name: Build and Publish Cloudflare Worker

on:
  push:
    branches: [main]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustup default stable
          rustup target add wasm32-unknown-unknown

      - name: Build WASM artifact
        run: |
          source $HOME/.cargo/env
          cargo build --release --target wasm32-unknown-unknown
          mkdir -p build
          cp target/wasm32-unknown-unknown/release/iceberg.wasm build/ || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Workers
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          # Deploy the prebuilt bundle and wasm; wrangler will use build/index.js
          # Capture deploy output so we can auto-detect the deployed worker URL.
          set -o pipefail
          wrangler deploy --env production 2>&1 | tee deploy_output.txt
          # Extract first https:// URL from the deploy output
          WORKER_URL=$(grep -oE 'https?://[^[:space:]]+' deploy_output.txt | grep -m1 'https://' || true)
          if [ -z "$WORKER_URL" ]; then
            echo "Unable to determine WORKER_URL from wrangler output" >&2
            cat deploy_output.txt >&2
            exit 1
          fi
          echo "WORKER_URL=$WORKER_URL" >> $GITHUB_ENV

      - name: Run smoke tests
        if: always()
        env:
          SMOKE_GITHUB_TOKEN: ${{ secrets.SMOKE_GITHUB_TOKEN }}
        run: |
          if [ -z "${WORKER_URL:-}" ]; then
            echo "WORKER_URL not set by publish step; failing" >&2
            exit 1
          fi
          echo "Using WORKER_URL=$WORKER_URL"
          chmod +x ./scripts/smoke_test.sh
          ./scripts/smoke_test.sh "$WORKER_URL" "$SMOKE_GITHUB_TOKEN"
